name: Update Projects Table

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta a las 12 de la noche
  workflow_dispatch: # Permite darle al botón "Play" manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python update_projects.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update projects table" || exit 0
          git push
